<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cáritas CNC — Registro de Familias</title>

  <!-- Manifest PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0a4bff" />

  <!-- Leaflet CSS (mapas) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Estilos rápidos -->
  <style>
    :root {
      --bg: #0a0f1a; --card: #111827; --muted: #94a3b8; --b: #0a4bff; --b2: #0a62ff;
      --ok: #22c55e; --err: #ef4444; --text: #e5e7eb;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;
      background:linear-gradient(180deg,#0b1020, #0a0f1a 60%); color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(17,24,39,.8);
      backdrop-filter: blur(8px);border-bottom:1px solid #1f2937}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    h1{margin:0;font-size:1.4rem}
    .grid{display:grid;grid-template-columns: 1fr 1fr;gap:16px}
    .card{background:var(--card);border:1px solid #1f2937;border-radius:16px;padding:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25)}
    label{display:block;font-size:.9rem;margin:8px 0 6px;color:var(--muted)}
    input,textarea,button{width:100%;padding:12px;border-radius:12px;border:1px solid #263244;
      background:#0b1220;color:var(--text)}
    textarea{min-height:90px;resize:vertical}
    button{cursor:pointer;border:none;background:linear-gradient(180deg,var(--b),var(--b2));
      font-weight:600;letter-spacing:.2px;transition:transform .05s ease, opacity .2s ease}
    button:active{transform:translateY(1px)}
    .row{display:flex;gap:8px;align-items:center}
    .row > *{flex:1}
    .muted{color:var(--muted);font-size:.9rem}
    .ok{color:var(--ok)} .err{color:var(--err)}
    .list-header{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .badge{font-size:.75rem;border:1px solid #263244;border-radius:999px;padding:6px 10px}
    ul{list-style:none;margin:0;padding:0;display:grid;gap:10px;max-height:360px;overflow:auto}
    li{background:#0b1220;border:1px solid #22304d;border-radius:12px;padding:12px;display:grid;gap:4px}
    .addr{color:#cbd5e1}
    #map{height:320px;border-radius:16px;border:1px solid #22304d}
    .top-actions{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:10px}
    .ghost{background:#0b1220;border:1px solid #22304d}
    .pill{max-width:280px}
    .footer{padding:24px 0;color:var(--muted);text-align:center}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    /* Sugerencias (datalist) no requiere estilos extra */
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>📘 Cáritas CNC — Registro</h1>
      <div class="muted">Registro de familias con búsqueda y mapa (Leaflet + Nominatim).</div>
    </div>
  </header>

  <main class="wrap" style="padding-top:16px;">
    <div class="grid">
      <!-- FORMULARIO -->
      <section class="card">
        <h2 style="margin-top:0">Nueva familia</h2>
        <form id="familia-form">
          <label for="nombre">Nombre de familia</label>
          <input id="nombre" name="nombre" placeholder="Ej. Familia García" required>

          <label for="direccion">Dirección (con sugerencias)</label>
          <div class="row">
            <input id="direccion" name="direccion" placeholder="Calle, número, distrito..."
                   autocomplete="off" list="dl-direcciones" required>
            <button type="button" id="btn-ver-mapa" title="Buscar y centrar">📍 Ver en mapa</button>
          </div>
          <datalist id="dl-direcciones"></datalist>

          <label for="telefono">Teléfono</label>
          <input id="telefono" name="telefono" placeholder="Ej. 999 888 777">

          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones" placeholder="Notas adicionales..."></textarea>

          <div class="top-actions">
            <button type="submit">Guardar</button>
            <span id="form-msg" class="muted"></span>
          </div>
        </form>

        <div style="margin-top:14px">
          <div id="map"></div>
        </div>
      </section>

      <!-- LISTA -->
      <section class="card">
        <div class="list-header">
          <input id="buscador" class="pill" placeholder="🔎 Buscar por nombre o dirección..." />
          <button id="btn-refrescar" class="ghost" style="max-width:140px">↻ Actualizar</button>
          <span id="contador" class="badge">0 resultados</span>
        </div>
        <ul id="lista"></ul>
        <div class="muted" style="margin-top:8px;">Consejo: escribe al menos 2 letras para filtrar resultados.</div>
      </section>
    </div>

    <div class="footer">PWA lista • Mapas por OpenStreetMap/Leaflet • Geocodificación por Nominatim</div>
  </main>

  <!-- Supabase -->
  <script type="module">
    import { supabase } from './supabase-config.js';

    const form = document.getElementById('familia-form');
    const msg = document.getElementById('form-msg');
    const lista = document.getElementById('lista');
    const buscador = document.getElementById('buscador');
    const contador = document.getElementById('contador');
    const btnRefrescar = document.getElementById('btn-refrescar');
    const btnVerMapa = document.getElementById('btn-ver-mapa');
    const direccionInput = document.getElementById('direccion');
    const dlDirecciones = document.getElementById('dl-direcciones');

    let familias = [];   // cache local
    let map, marker;     // Leaflet

    // --------- MAPA (Leaflet) ---------
    function initMap() {
      map = L.map('map', {
        center: [-12.0464, -77.0428], // Lima
        zoom: 12,
        zoomControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contrib.'
      }).addTo(map);
    }

    function centerMap(lat, lng, label = '') {
      const pos = [lat, lng];
      map.setView(pos, 16);
      if (!marker) {
        marker = L.marker(pos, { title: label }).addTo(map);
      } else {
        marker.setLatLng(pos);
      }
      if (label) marker.bindPopup(label).openPopup();
    }

    // --------- Nominatim (búsqueda/geocodificación) ---------
    async function geocodeAddress(q, limit = 1) {
      const url = new URL('https://nominatim.openstreetmap.org/search');
      url.searchParams.set('format', 'json');
      url.searchParams.set('q', q);
      url.searchParams.set('addressdetails', '1');
      url.searchParams.set('limit', String(limit));
      // Nominatim pide un "User-Agent" o "Referer" identificable: el navegador enviará el referer de tu sitio.
      const resp = await fetch(url, { headers: { 'Accept-Language': 'es' } });
      if (!resp.ok) throw new Error('Nominatim error');
      return resp.json();
    }

    // sugerencias en <datalist>
    let sugTimer;
    direccionInput.addEventListener('input', () => {
      clearTimeout(sugTimer);
      const q = direccionInput.value.trim();
      if (q.length < 3) { dlDirecciones.innerHTML = ''; return; }
      sugTimer = setTimeout(async () => {
        try {
          const results = await geocodeAddress(q, 5);
          dlDirecciones.innerHTML = results.map(r => `<option value="${escapeHtml(r.display_name)}"></option>`).join('');
        } catch {}
      }, 350);
    });

    btnVerMapa.addEventListener('click', async () => {
      const addr = direccionInput.value.trim();
      if (!addr) return;
      try {
        const results = await geocodeAddress(addr, 1);
        if (results && results[0]) {
          const { lat, lon, display_name } = results[0];
          centerMap(parseFloat(lat), parseFloat(lon), display_name);
        } else {
          alert('No se encontró esa dirección.');
        }
      } catch {
        alert('Error al buscar la dirección.');
      }
    });

    // --------- SUPABASE: CRUD BÁSICO ---------
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Guardando...';
      try {
        const payload = {
          nombre: document.getElementById('nombre').value.trim(),
          direccion: direccionInput.value.trim(),
          telefono: document.getElementById('telefono').value.trim(),
          observaciones: document.getElementById('observaciones').value.trim(),
          creado_en: new Date().toISOString()
        };
        const { error } = await supabase.from('familias').insert([payload]);
        if (error) throw error;
        msg.textContent = '✅ Guardado'; msg.className = 'ok';
        form.reset();
        await cargarFamilias(true);
      } catch (err) {
        console.error('Error insert:', err);
        msg.textContent = '❌ Error al guardar'; msg.className = 'err';
      } finally {
        setTimeout(()=>{ msg.textContent=''; msg.className='muted';}, 1800);
      }
    });

    async function cargarFamilias() {
      try {
        btnRefrescar.disabled = true; btnRefrescar.textContent = 'Actualizando...';
        const { data, error } = await supabase
          .from('familias')
          .select('id,nombre,direccion,telefono,observaciones,creado_en')
          .order('id', { ascending: true });
        if (error) throw error;
        familias = data || [];
        renderLista();
      } catch (err) {
        console.error('Error load familias:', err);
        alert('Error al cargar familias. Revisa Supabase-config o RLS.');
      } finally {
        btnRefrescar.disabled = false; btnRefrescar.textContent = '↻ Actualizar';
      }
    }

    function renderLista() {
      const q = buscador.value.trim().toLowerCase();
      const filtradas = q.length >= 2
        ? familias.filter(f =>
            (f.nombre || '').toLowerCase().includes(q) ||
            (f.direccion || '').toLowerCase().includes(q)
          )
        : familias;

      lista.innerHTML = '';
      filtradas.forEach(f => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:start">
            <strong>${escapeHtml(f.nombre || '(sin nombre)')}</strong>
            <span class="muted" style="font-size:.8rem">${formatDate(f.creado_en)}</span>
          </div>
          <div class="addr">📍 ${escapeHtml(f.direccion || '—')}</div>
          ${f.telefono ? `<div>📞 ${escapeHtml(f.telefono)}</div>` : ''}
          ${f.observaciones ? `<div class="muted">📝 ${escapeHtml(f.observaciones)}</div>` : ''}
          <div class="row" style="margin-top:8px">
            <button class="ghost" data-geo="${encodeURIComponent(f.direccion || '')}">📍 Ver en mapa</button>
            <button class="ghost" data-del="${f.id}">🗑️ Eliminar</button>
          </div>
        `;
        lista.appendChild(li);
      });

      // Botones de cada item
      lista.querySelectorAll('button[data-geo]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const addr = decodeURIComponent(btn.dataset.geo || '');
          if (!addr) return;
          try {
            const results = await geocodeAddress(addr, 1);
            if (results && results[0]) {
              const { lat, lon, display_name } = results[0];
              centerMap(parseFloat(lat), parseFloat(lon), display_name);
            }
          } catch {}
        });
      });

      lista.querySelectorAll('button[data-del]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('¿Eliminar este registro?')) return;
          const id = Number(btn.dataset.del);
          try {
            const { error } = await supabase.from('familias').delete().eq('id', id);
            if (error) throw error;
            familias = familias.filter(x => x.id !== id);
            renderLista();
          } catch (err) {
            console.error('Error delete:', err);
            alert('No se pudo eliminar (verifica RLS).');
          }
        });
      });

      contador.textContent = `${filtradas.length} resultado${filtradas.length===1?'':'s'}`;
    }

    function escapeHtml(s=''){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function formatDate(iso){ try{ const d=new Date(iso); return d.toLocaleString('es-PE'); }catch{ return '—';} }

    buscador.addEventListener('input', renderLista);
    btnRefrescar.addEventListener('click', () => cargarFamilias(true));

    // Inicializar
    initMap();
    cargarFamilias();

    // --------- SERVICE WORKER ---------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.log('SW no registrado:', err));
      });
    }
  </script>

  <!-- Leaflet JS (mapas) -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
</body>
</html>
